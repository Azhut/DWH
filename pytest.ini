[pytest]
# Автоматический режим для асинхронных тестов
asyncio_mode = auto

# Область видимости event loop для асинхронных фикстур
asyncio_default_fixture_loop_scope = function

# Пути к тестам
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Добавляем корень проекта в sys.path, чтобы `import app` и `import tests.*`
# всегда резолвились в локальные пакеты, а не в сторонние модули из site-packages.
pythonpath = .

# Вывод: показывать локальные переменные при ошибках.
# `-s` отключает capture и обычно убирает "двойной" вывод в IDE/раннерах.
addopts = -v --tb=short -s

# Фильтрация предупреждений (опционально)
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest_asyncio.plugin.PytestDeprecationWarning