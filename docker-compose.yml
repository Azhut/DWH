version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sport_api
    ports:
      - "2700:2700"
    environment:
      APP_ENV: "production"
      MONGO_URI: "mongodb://mongo:27017"
      DATABASE_NAME: "sport_data"
      API_HOST: "0.0.0.0"
      API_PORT: 2700
      DEBUG: "False"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2700/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s



  mongo:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "2701:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/replica-set-init.sh:/docker-entrypoint-initdb.d/replica-set-init.sh:ro
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status().myState == 1 && db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  mongodb_data:
